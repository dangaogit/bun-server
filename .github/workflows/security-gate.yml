name: Security Gate

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check insecure dev host bindings
        run: bun run security:check-dev-host

      - name: Audit dependencies (fail only on high/critical)
        shell: bash
        run: |
          set +e
          bun audit > audit.log 2>&1
          AUDIT_EXIT=$?
          set -e

          cat audit.log

          if [ "$AUDIT_EXIT" -eq 0 ]; then
            echo "No vulnerabilities found."
            exit 0
          fi

          if rg -i "(high|critical):" audit.log; then
            echo "High or critical vulnerabilities found."
            exit 1
          fi

          echo "Only low/moderate vulnerabilities found; not blocking."
