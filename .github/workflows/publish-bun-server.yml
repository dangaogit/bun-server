name: Publish @dangao/bun-server to npm

on:
  push:
    branches: [main]
    paths:
      - "packages/bun-server/package.json"
      - "packages/bun-server/**"
      - "bun.lock"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC / npm Trusted Publishing

concurrency:
  group: publish-bun-server
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # needed to compare HEAD^ version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect version change (@dangao/bun-server)
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          CUR=$(node -p "require('./packages/bun-server/package.json').version")
          echo "current=$CUR" >> "$GITHUB_OUTPUT"

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV=$(git show HEAD^:packages/bun-server/package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
            echo "previous=$PREV" >> "$GITHUB_OUTPUT"

            if [ "$CUR" = "$PREV" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "Version unchanged ($CUR). Skip publish."
              exit 0
            fi
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Version changed. Will publish: $CUR"

      - name: Publish to npm (Bun)
        if: steps.ver.outputs.changed == 'true'
        run: bun --cwd=packages/bun-server run publish:package
